<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}情侣积分系统{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- 导航栏 -->
        <nav class="navbar">
            <div class="nav-brand">💕 情侣积分系统</div>
            <div class="nav-links">
                <a href="{{ url_for('index') }}" class="nav-link">首页</a>
                <a href="{{ url_for('add_record') }}" class="nav-link">记录积分</a>
                <a href="{{ url_for('items') }}" class="nav-link">积分项目管理</a>
                <a href="{{ url_for('rewards') }}" class="nav-link">兑换奖励</a>
                <a href="{{ url_for('exchanges') }}" class="nav-link">兑换记录</a>
            </div>
        </nav>

        <!-- 消息提示 -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">
                        {{ message }}
                        <button class="alert-close" onclick="this.parentElement.style.display='none'">×</button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- 页面内容 -->
        <main class="content">
            {% block content %}{% endblock %}
        </main>

        <!-- 页脚 -->
        <footer class="footer">
            <p>💝 用爱记录每一天</p>
        </footer>
    </div>
</body>
</html>
