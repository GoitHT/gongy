{% extends "base.html" %}

{% block title %}记录积分 - 情侣积分系统{% endblock %}

{% block content %}
<div class="page-header">
    <h1>📝 记录积分</h1>
    <p class="page-subtitle">选择一个积分项目快速记录</p>
</div>

<div class="card" style="max-width: 600px; margin: 0 auto;">
    <div class="card-body">
        {% if items %}
            <form method="POST" action="{{ url_for('submit_record') }}" class="form">
                <div class="form-group">
                    <label for="item_id">选择积分项目 *</label>
                    <select id="item_id" name="item_id" required onchange="updatePreview()">
                        <option value="">-- 请选择 --</option>
                        {% for item in items %}
                            <option value="{{ item.id }}" data-points="{{ item.points }}" data-name="{{ item.name }}" data-desc="{{ item.description or '' }}">
                                {{ item.name }} (+{{ item.points }}分)
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- 预览卡片 -->
                <div id="preview" class="preview-card" style="display: none;">
                    <div class="preview-header">即将记录</div>
                    <div class="preview-content">
                        <div class="preview-item">
                            <span class="preview-label">项目：</span>
                            <span id="preview_name" class="preview-value"></span>
                        </div>
                        <div class="preview-item">
                            <span class="preview-label">积分：</span>
                            <span id="preview_points" class="preview-value points-highlight"></span>
                        </div>
                        <div id="preview_desc_container" class="preview-item" style="display: none;">
                            <span class="preview-label">说明：</span>
                            <span id="preview_desc" class="preview-value"></span>
                        </div>
                    </div>
                </div>

                <div class="form-actions" style="margin-top: 30px;">
                    <a href="{{ url_for('index') }}" class="btn btn-secondary">取消</a>
                    <button type="submit" class="btn btn-primary">
                        <span class="btn-icon">✓</span>
                        确认记录
                    </button>
                </div>
            </form>
        {% else %}
            <div class="empty-state">
                <div class="empty-icon">📦</div>
                <div class="empty-text">暂无可用的积分项目</div>
                <div class="empty-hint">请先在积分项目管理中创建项目</div>
                <a href="{{ url_for('items') }}" class="btn btn-primary" style="margin-top: 20px;">
                    前往创建
                </a>
            </div>
        {% endif %}
    </div>
</div>

<script>
function updatePreview() {
    const select = document.getElementById('item_id');
    const preview = document.getElementById('preview');
    const selectedOption = select.options[select.selectedIndex];
    
    if (select.value) {
        const name = selectedOption.getAttribute('data-name');
        const points = selectedOption.getAttribute('data-points');
        const desc = selectedOption.getAttribute('data-desc');
        
        document.getElementById('preview_name').textContent = name;
        document.getElementById('preview_points').textContent = '+' + points + ' 分';
        
        if (desc) {
            document.getElementById('preview_desc').textContent = desc;
            document.getElementById('preview_desc_container').style.display = 'flex';
        } else {
            document.getElementById('preview_desc_container').style.display = 'none';
        }
        
        preview.style.display = 'block';
    } else {
        preview.style.display = 'none';
    }
}
</script>
{% endblock %}
