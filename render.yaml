databases:
  - name: gongy-db
    databaseName: gongy
    user: gongy_user

services:
  - type: web
    name: gongy-web
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gongy-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
